version: '3.8'

services:
  zookeeper:
    image: bitnami/zookeeper:latest
    container_name: zookeeper
    restart: always
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/bitnami/zookeeper
    networks:
      - nifi-net

  nifi-registry:
    image: apache/nifi-registry:latest
    container_name: nifi-registry
    restart: always
    ports:
      - "18080:18080"
    environment:
      - NIFI_REGISTRY_WEB_HTTP_PORT=18080
    volumes:
      - nifi_registry_data:/opt/nifi-registry/nifi-registry-current/database
      - nifi_registry_flow_storage:/opt/nifi-registry/nifi-registry-current/flow_storage
    networks:
      - nifi-net
    depends_on:
      - zookeeper

  nifi-1:
    image: apache/nifi:2.4.0
    container_name: nifi-1
    restart: always
    ports:
      - "8443:8443"
    environment:
      - NIFI_WEB_HTTPS_PORT=8443
      - NIFI_CLUSTER_IS_NODE=true
      - NIFI_CLUSTER_NODE_PROTOCOL_PORT=9991
      - NIFI_ZK_CONNECT_STRING=zookeeper:2181
      - NIFI_ELECTION_MAX_WAIT=1 min
      - NIFI_SENSITIVE_PROPS_KEY=nifi-key
      - NIFI_SENSITIVE_PROPS_ALGORITHM=PBEWITHMD5AND256BITAES-CBC-OPENSSL
      - NIFI_SECURITY_USER_AUTHORIZER=managed-authorizer
      - NIFI_SECURITY_USER_LOGIN_IDENTITY_PROVIDER=single-user-provider
      - NIFI_SECURITY_IDENTITY_MAPPING_PATTERN_KERB=^(.*?)@(.*?)$
      - NIFI_SECURITY_IDENTITY_MAPPING_VALUE_KERB=$1
      - NIFI_SECURITY_IDENTITY_MAPPING_TRANSFORM_KERB=NONE
      - NIFI_SECURITY_IDENTITY_MAPPING_PATTERN_DN=^CN=(.*?), OU=(.*?)$
      - NIFI_SECURITY_IDENTITY_MAPPING_VALUE_DN=$1
      - NIFI_SECURITY_IDENTITY_MAPPING_TRANSFORM_DN=NONE
      - NIFI_SECURITY_IDENTITY_MAPPING_PATTERN_NONE=^(.*?)$
      - NIFI_SECURITY_IDENTITY_MAPPING_VALUE_NONE=$1
      - NIFI_SECURITY_IDENTITY_MAPPING_TRANSFORM_NONE=NONE
      - NIFI_WEB_PROXY_HOST=
    volumes:
      - nifi_1_conf:/opt/nifi/nifi-current/conf
      - nifi_1_state:/opt/nifi/nifi-current/state
      - nifi_1_content_repository:/opt/nifi/nifi-current/content_repository
      - nifi_1_database_repository:/opt/nifi/nifi-current/database_repository
      - nifi_1_flowfile_repository:/opt/nifi/nifi-current/flowfile_repository
      - nifi_1_provenance_repository:/opt/nifi/nifi-current/provenance_repository
      - nifi_1_logs:/opt/nifi/nifi-current/logs
    networks:
      - nifi-net
    depends_on:
      - zookeeper
      - nifi-registry

  nifi-2:
    image: apache/nifi:2.4.0
    container_name: nifi-2
    restart: always
    ports:
      - "8444:8443"
    environment:
      - NIFI_WEB_HTTPS_PORT=8443
      - NIFI_CLUSTER_IS_NODE=true
      - NIFI_CLUSTER_NODE_PROTOCOL_PORT=9992
      - NIFI_ZK_CONNECT_STRING=zookeeper:2181
      - NIFI_ELECTION_MAX_WAIT=1 min
      - NIFI_SENSITIVE_PROPS_KEY=nifi-key
      - NIFI_SENSITIVE_PROPS_ALGORITHM=PBEWITHMD5AND256BITAES-CBC-OPENSSL
      - NIFI_SECURITY_USER_AUTHORIZER=managed-authorizer
      - NIFI_SECURITY_USER_LOGIN_IDENTITY_PROVIDER=single-user-provider
      - NIFI_SECURITY_IDENTITY_MAPPING_PATTERN_KERB=^(.*?)@(.*?)$
      - NIFI_SECURITY_IDENTITY_MAPPING_VALUE_KERB=$1
      - NIFI_SECURITY_IDENTITY_MAPPING_TRANSFORM_KERB=NONE
      - NIFI_SECURITY_IDENTITY_MAPPING_PATTERN_DN=^CN=(.*?), OU=(.*?)$
      - NIFI_SECURITY_IDENTITY_MAPPING_VALUE_DN=$1
      - NIFI_SECURITY_IDENTITY_MAPPING_TRANSFORM_DN=NONE
      - NIFI_SECURITY_IDENTITY_MAPPING_PATTERN_NONE=^(.*?)$
      - NIFI_SECURITY_IDENTITY_MAPPING_VALUE_NONE=$1
      - NIFI_SECURITY_IDENTITY_MAPPING_TRANSFORM_NONE=NONE
      - NIFI_WEB_PROXY_HOST=
    volumes:
      - nifi_2_conf:/opt/nifi/nifi-current/conf
      - nifi_2_state:/opt/nifi/nifi-current/state
      - nifi_2_content_repository:/opt/nifi/nifi-current/content_repository
      - nifi_2_database_repository:/opt/nifi/nifi-current/database_repository
      - nifi_2_flowfile_repository:/opt/nifi/nifi-current/flowfile_repository
      - nifi_2_provenance_repository:/opt/nifi/nifi-current/provenance_repository
      - nifi_2_logs:/opt/nifi/nifi-current/logs
    networks:
      - nifi-net
    depends_on:
      - zookeeper
      - nifi-registry

  nifi-toolkit:
    image: apache/nifi-toolkit:latest
    container_name: nifi-toolkit
    restart: on-failure
    environment:
      - NIFI_TOOLKIT_HOME=/opt/nifi-toolkit
    volumes:
      - ./scripts:/scripts
    networks:
      - nifi-net
    depends_on:
      - nifi-1
      - nifi-2
      - nifi-registry

networks:
  nifi-net:
    driver: bridge

volumes:
  zookeeper_data:
  nifi_registry_data:
  nifi_registry_flow_storage:
  nifi_1_conf:
  nifi_1_state:
  nifi_1_content_repository:
  nifi_1_database_repository:
  nifi_1_flowfile_repository:
  nifi_1_provenance_repository:
  nifi_1_logs:
  nifi_2_conf:
  nifi_2_state:
  nifi_2_content_repository:
  nifi_2_database_repository:
  nifi_2_flowfile_repository:
  nifi_2_provenance_repository:
  nifi_2_logs: